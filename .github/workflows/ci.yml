name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu – GCC
          - os: ubuntu-24.04
            compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            std: 17
          # Ubuntu – Clang
          - os: ubuntu-24.04
            compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            std: 17

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.cc }} ${{ matrix.cxx }}

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

  build-native-module:
    name: Build native module
    runs-on: ubuntu-latest
    env:
      WORKING_DIRECTORY: 'node-module'


    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - name: Copy sero headers into package
        run: cp -r include ${{ env.WORKING_DIRECTORY }}/include
      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: bun install
      - name: Build
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: bun run build
